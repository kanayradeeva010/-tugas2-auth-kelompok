<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Profil</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">
        <a th:href="@{/}" style="color:inherit;text-decoration:none;">← Kembali</a>
    </div>
    <div class="nav-actions">
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline">Logout</button>
        </form>
    </div>
</nav>

<main class="container" style="max-width:480px;margin-top:3rem;text-align:center;">
    <img th:src="${userPicture}" alt="foto" style="width:96px;height:96px;border-radius:50%;margin-bottom:1rem;"/>
    <h1 th:text="${userName}" style="margin-bottom:0.25rem;"></h1>
    <p th:text="${userEmail}" style="opacity:0.6;margin-bottom:1.5rem;"></p>

    <div sec:authorize="hasRole('MEMBER')" class="role-badge member" style="margin-bottom:1rem;">
        ✓ Anggota Kelompok
    </div>
    <div sec:authorize="!hasRole('MEMBER')" class="role-badge user" style="margin-bottom:1rem;">
        Tamu Terautentikasi
    </div>
</main>
</body>
</html>
