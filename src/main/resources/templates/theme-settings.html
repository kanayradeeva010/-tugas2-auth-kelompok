<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pengaturan Tampilan</title>
    <style th:inline="text">
        :root {
            --primary:    [[${theme.primaryColor}]];
            --bg:         [[${theme.backgroundColor}]];
            --text:       [[${theme.textColor}]];
            --font:       [[${theme.fontFamily}]];
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <a th:href="@{/}" style="color:inherit;text-decoration:none;">← Kembali ke Biodata</a>
    </div>
    <div class="nav-actions">
        <span class="user-info">
            <span th:text="${userName}">Nama User</span>
            <span class="role-badge member" style="font-size:0.75rem;padding:2px 8px;">MEMBER</span>
        </span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline">Logout</button>
        </form>
    </div>
</nav>

<main class="container" style="max-width: 680px; margin-top: 2rem;">
    <h1 style="margin-bottom: 0.5rem;">Pengaturan Tampilan</h1>
    <p style="color: var(--text); opacity: 0.6; margin-bottom: 2rem;">
        Perubahan akan langsung terlihat di halaman utama untuk semua pengunjung.
    </p>

    <!-- Pesan sukses -->
    <div th:if="${successMessage}" class="alert alert-success"
         th:text="${successMessage}"></div>

    <!-- Form ubah theme -->
    <form th:action="@{/theme/update}" method="post" class="theme-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="primaryColor">Warna Utama (tombol, heading)</label>
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <input type="color" id="primaryColor" name="primaryColor"
                       th:value="${theme.primaryColor}" class="color-input"/>
                <input type="text"  id="primaryColorText" th:value="${theme.primaryColor}"
                       oninput="document.getElementById('primaryColor').value=this.value"
                       class="text-input" placeholder="#2563EB"/>
            </div>
        </div>

        <div class="form-group">
            <label for="backgroundColor">Warna Latar Belakang</label>
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <input type="color" id="backgroundColor" name="backgroundColor"
                       th:value="${theme.backgroundColor}" class="color-input"/>
                <input type="text" th:value="${theme.backgroundColor}"
                       oninput="document.getElementById('backgroundColor').value=this.value"
                       class="text-input" placeholder="#F8FAFC"/>
            </div>
        </div>

        <div class="form-group">
            <label for="textColor">Warna Teks</label>
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <input type="color" id="textColor" name="textColor"
                       th:value="${theme.textColor}" class="color-input"/>
                <input type="text" th:value="${theme.textColor}"
                       oninput="document.getElementById('textColor').value=this.value"
                       class="text-input" placeholder="#1E293B"/>
            </div>
        </div>

        <div class="form-group">
            <label for="fontFamily">Font</label>
            <select id="fontFamily" name="fontFamily" class="select-input">
                <option value="'Segoe UI', sans-serif"
                        th:selected="${theme.fontFamily == '''Segoe UI'', sans-serif'}">
                    Segoe UI (Default)
                </option>
                <option value="'Georgia', serif"
                        th:selected="${theme.fontFamily == '''Georgia'', serif'}">
                    Georgia (Serif)
                </option>
                <option value="'Courier New', monospace"
                        th:selected="${theme.fontFamily == '''Courier New'', monospace'}">
                    Courier New (Monospace)
                </option>
                <option value="'Arial', sans-serif"
                        th:selected="${theme.fontFamily == '''Arial'', sans-serif'}">
                    Arial
                </option>
                <option value="'Trebuchet MS', sans-serif"
                        th:selected="${theme.fontFamily == '''Trebuchet MS'', sans-serif'}">
                    Trebuchet MS
                </option>
            </select>
        </div>

        <div style="display:flex;gap:1rem;margin-top:2rem;">
            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
        </div>
    </form>

    <!-- Form reset -->
    <form th:action="@{/theme/reset}" method="post" style="margin-top:1rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline"
                onclick="return confirm('Reset tampilan ke default?')">
            Reset ke Default
        </button>
    </form>
</main>

<script>
    // Sync color picker <-> text input
    document.getElementById('primaryColor').addEventListener('input', function() {
        document.getElementById('primaryColorText').value = this.value;
    });
</script>
</body>
</html>
